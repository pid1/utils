[font]
size = 24.0

[font.normal]
family = "Atkinson Hyperlegible Mono"
style = "Regular"

[font.bold]
family = "Atkinson Hyperlegible Mono"
style = "Bold"

[font.italic]
family = "Atkinson Hyperlegible Mono"
style = "Italic"

[font.bold_italic]
family = "Atkinson Hyperlegible Mono"
style = "Bold Italic"

[general]
import = [
    "~/.config/alacritty/themes/themes/cytracom_light.toml"
]

# Pass right-click through to tmux (instead of Alacritty handling it).
# Hold Shift + right-click to bypass tmux and get native terminal behavior.
[[mouse.bindings]]
mouse  = "Right"
action = "ReceiveChar"

[[mouse.bindings]]
mouse  = "Middle"
action = "ReceiveChar"
